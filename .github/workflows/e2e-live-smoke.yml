name: E2E Live Patch Smoke

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image reference to patch
        required: true
        type: string
        default: node:24-slim
      push:
        description: Push verified patched image
        required: true
        default: false
        type: boolean
      dry_run:
        description: Skip build/verify/push and generate artifacts only
        required: true
        default: false
        type: boolean
      severities:
        description: Comma-separated severities to patch
        required: true
        default: CRITICAL,HIGH,MEDIUM,LOW
        type: string

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch image with local composite action
        id: patch
        uses: ./
        with:
          image: ${{ inputs.image }}
          severities: ${{ inputs.severities }}
          push: "${{ inputs.push }}"
          dry-run: "${{ inputs.dry_run }}"
          non-interactive: "true"
          dh-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dh-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Print patched image
        run: 'echo "Patched image tag: ${{ steps.patch.outputs.patched_image }}"'
