name: E2E Live Patch Smoke

on:
  workflow_dispatch:
    inputs:
      dockerfile_path:
        description: Path to the Dockerfile to patch
        required: true
        default: ./Dockerfile
        type: string
      severities:
        description: Comma-separated CVE severities to target
        required: false
        default: CRITICAL,HIGH,MEDIUM,LOW
        type: string
      dry_run:
        description: Generate patch artifacts only, skip build and verify
        required: false
        default: false
        type: boolean

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch Docker image
        id: patch
        uses: ./
        with:
          dockerfile-path: ${{ inputs.dockerfile_path }}
          severities: ${{ inputs.severities }}
          dry-run: "${{ inputs.dry_run }}"
          dh-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dh-password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: ./vuln_reports
          if-no-files-found: warn
