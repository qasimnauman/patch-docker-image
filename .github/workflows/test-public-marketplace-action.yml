name: Test Patch Action

on:
  workflow_dispatch:
    inputs:
      dockerfile_path:
        description: Path to the Dockerfile to patch
        required: true
        default: ./Dockerfile
        type: string
      severities:
        description: Comma-separated severities to evaluate
        required: true
        default: CRITICAL,HIGH,MEDIUM,LOW
        type: string
      report_dir:
        description: Path to write vulnerability reports
        required: true
        default: ./vuln_reports
        type: string
      enforce_gate:
        description: Fail workflow if action fails verification (production behavior)
        required: true
        default: true
        type: boolean

jobs:
  test-action:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Scout
        run: |
          set -euo pipefail

          if docker scout version >/dev/null 2>&1; then
            echo "Docker Scout is already installed."
            docker scout version
            exit 0
          fi

          if ! command -v curl >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y curl
          fi

          mkdir -p "$HOME/.docker"
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
          docker scout version

      - name: Verify Dockerfile exists
        run: |
          set -euo pipefail
          if [[ ! -f "${{ inputs.dockerfile_path }}" ]]; then
            echo "ERROR: Dockerfile not found at ${{ inputs.dockerfile_path }}"
            exit 1
          fi
          echo "Dockerfile found at ${{ inputs.dockerfile_path }}"
          head -5 "${{ inputs.dockerfile_path }}"

      - name: Patch Dockerfile (Dockerfile-only mode)
        id: patch
        continue-on-error: true
        uses: qasimnauman/patch-docker-image@v1.0.2
        with:
          dockerfile-path: ${{ inputs.dockerfile_path }}
          context-path: .
          severities: ${{ inputs.severities }}
          report-dir: ${{ inputs.report_dir }}
          non-interactive: "true"

      - name: Print action result
        if: always()
        run: |
          echo "Action outcome: ${{ steps.patch.outcome }}"
          echo "Action conclusion: ${{ steps.patch.conclusion }}"
          echo "Patched image output is not used in Dockerfile-only mode."

      - name: List generated reports
        if: always()
        run: |
          if [[ -d "${{ inputs.report_dir }}" ]]; then
            echo "Generated vulnerability reports:"
            find "${{ inputs.report_dir }}" -maxdepth 3 -type f | sort
          else
            echo "No reports generated"
          fi

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: ${{ inputs.report_dir }}
          if-no-files-found: warn

      - name: Enforce production gate
        if: always()
        run: |
          set -euo pipefail
          if [[ "${{ inputs.enforce_gate }}" == "true" && "${{ steps.patch.outcome }}" != "success" ]]; then
            echo "Production gate: patch action did not pass verification"
            exit 1
          fi
          echo "Gate check passed (enforce_gate=${{ inputs.enforce_gate }})"
