name: Patch Docker Image
description: >
  Scan, patch, and verify Docker image vulnerabilities for Node.js and Python images.
  Handles all required setup (Docker Buildx, Docker Scout) internally.

inputs:
  dockerfile-path:
    description: Path to the Dockerfile to patch.
    required: false
    default: ./Dockerfile
  context-path:
    description: Build context path for dockerfile-path.
    required: false
    default: .
  build-args:
    description: Optional newline-separated build args (KEY=VALUE).
    required: false
    default: ""
  severities:
    description: Comma-separated CVE severities to target.
    required: false
    default: CRITICAL,HIGH,MEDIUM,LOW
  patched-suffix:
    description: Suffix appended to the source image tag for the patched output tag.
    required: false
    default: -patched
  report-dir:
    description: Directory to write Scout reports and the generated patch Dockerfile.
    required: false
    default: ./vuln_reports
  dry-run:
    description: Generate patch artifacts only — skip build, verify, and push.
    required: false
    default: "false"
  push:
    description: Push the verified patched image to the registry after a clean scan.
    required: false
    default: "false"
  non-interactive:
    description: Fail instead of prompting when credentials are missing.
    required: false
    default: "true"
  use-buildx:
    description: Use docker buildx for the patched image build (with --load).
    required: false
    default: "false"
  setup-qemu:
    description: Set up QEMU for cross-platform builds. Only needed for multi-arch images.
    required: false
    default: "false"
  dh-user:
    description: Docker Hub username. Required for Docker Scout scans.
    required: false
    default: ""
  dh-password:
    description: Docker Hub password or access token. Required for Docker Scout scans.
    required: false
    default: ""
  python-version:
    description: Python version used to run the patcher tool.
    required: false
    default: "3.12"

outputs:
  patched_image:
    description: The derived patched image tag produced by the tool.
    value: ${{ steps.run-patcher.outputs.patched_image }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      if: ${{ inputs.setup-qemu == 'true' }}
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install Docker Scout
      shell: bash
      run: |
        set -euo pipefail
        if docker scout version >/dev/null 2>&1; then
          echo "Docker Scout already available: $(docker scout version 2>&1 | head -1)"
          exit 0
        fi
        if ! command -v curl >/dev/null 2>&1; then
          sudo apt-get update -qq && sudo apt-get install -y -qq curl
        fi
        curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
        docker scout version

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install docker-vuln-patcher
      shell: bash
      run: |
        set -euo pipefail
        project_root="$(cd "$GITHUB_ACTION_PATH/../../.." && pwd)"
        python -m pip install --upgrade pip --quiet
        python -m pip install "$project_root" --quiet

    - name: Docker Hub login
      if: ${{ inputs.dh-user != '' && inputs.dh-password != '' }}
      shell: bash
      run: |
        echo "${{ inputs.dh-password }}" | docker login --username "${{ inputs.dh-user }}" --password-stdin

    - name: Run patch and verification flow
      id: run-patcher
      shell: bash
      env:
        DOCKERHUB_USERNAME: ${{ inputs.dh-user }}
        DOCKERHUB_PASSWORD: ${{ inputs.dh-password }}
      run: |
        set -euo pipefail

        owner="$(echo "${GITHUB_REPOSITORY_OWNER:-local}" | tr '[:upper:]' '[:lower:]')"
        repo="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
        run_id="${GITHUB_RUN_ID:-local}"
        attempt="${GITHUB_RUN_ATTEMPT:-1}"
        derived_image="${owner}/${repo}:${run_id}-${attempt}"

        cmd=(docker-vuln-patcher
          --image "$derived_image"
          --dockerfile-path "${{ inputs.dockerfile-path }}"
          --context-path "${{ inputs.context-path }}"
          --severities "${{ inputs.severities }}"
          --report-dir "${{ inputs.report-dir }}"
          --patched-suffix="${{ inputs.patched-suffix }}"
        )

        [[ "${{ inputs.non-interactive }}" == "true" ]] && cmd+=(--non-interactive)
        [[ "${{ inputs.use-buildx }}"      == "true" ]] && cmd+=(--use-buildx)
        [[ "${{ inputs.dry-run }}"         == "true" ]] && cmd+=(--dry-run)
        [[ "${{ inputs.push }}"            == "true" ]] && cmd+=(--push)

        while IFS= read -r build_arg; do
          [[ -n "$build_arg" ]] && cmd+=(--build-arg "$build_arg")
        done <<< "${{ inputs.build-args }}"

        "${cmd[@]}"

        echo "patched_image=${derived_image}${{ inputs.patched-suffix }}" >> "$GITHUB_OUTPUT"
