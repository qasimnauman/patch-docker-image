name: Patch Docker Image
description: Scan, patch, and verify vulnerabilities using a Dockerfile input.
branding:
  icon: shield
  color: blue

inputs:
  dockerfile-path:
    description: Path to the Dockerfile to patch.
    required: false
    default: ./Dockerfile
  context-path:
    description: Optional build context path used with dockerfile-path.
    required: false
    default: .
  build-args:
    description: Optional newline-separated build args (KEY=VALUE).
    required: false
    default: ""
  severities:
    description: Comma-separated severities to patch.
    required: false
    default: CRITICAL,HIGH,MEDIUM,LOW
  patched-suffix:
    description: Suffix for patched image tag.
    required: false
    default: -patched
  report-dir:
    description: Directory for reports and generated patch Dockerfile.
    required: false
    default: ./vuln_reports
  dry-run:
    description: Only generate artifacts and skip build, verify, push.
    required: false
    default: "false"
  push:
    description: Push the verified patched image to the registry after a clean scan.
    required: false
    default: "false"
  non-interactive:
    description: Fail instead of prompting when credentials are missing.
    required: false
    default: "true"
  use-buildx:
    description: Use docker buildx for patched build.
    required: false
    default: "false"
  python-version:
    description: Python version for running the tool.
    required: false
    default: "3.12"
  dh-user:
    description: Docker Hub username used to authenticate Docker Scout.
    required: false
    default: ""
  dh-password:
    description: Docker Hub token or password used to authenticate Docker Scout.
    required: false
    default: ""
  create-pr:
    description: |
      Open a pull request in the current repository containing the verified
      patch Dockerfile and a CVE summary table after a successful zero-CVE scan.
      Requires the calling workflow to have:
        permissions:
          contents: write
          pull-requests: write
    required: false
    default: "false"
  pr-branch-prefix:
    description: Prefix for the auto-created patch branch name.
    required: false
    default: "docker-security-patch"

outputs:
  patched_image:
    description: The final verified patched image tag produced by the tool.
    value: ${{ steps.run-patcher.outputs.patched_image }}
  pr-url:
    description: URL of the pull request created (empty when create-pr is false or no CVEs were found).
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install docker-vuln-patcher
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip --quiet
        python -m pip install "$GITHUB_ACTION_PATH" --quiet

    - name: Install Docker Scout
      shell: bash
      run: |
        set -euo pipefail
        PLUGIN_DIR="$HOME/.docker/cli-plugins"

        # Always install the latest Scout release to the user plugin dir so we
        # get a known-good version regardless of what the runner pre-installs.
        if ! command -v curl >/dev/null 2>&1; then
          sudo apt-get update -qq && sudo apt-get install -y -qq curl
        fi
        mkdir -p "$PLUGIN_DIR"
        curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --

        # Add the plugin dir to PATH for every subsequent step so that
        # `docker-scout` works as a standalone binary (the Python tool falls
        # back to this when the Docker CLI plugin mechanism silently fails).
        echo "$PLUGIN_DIR" >> "$GITHUB_PATH"
        export PATH="$PLUGIN_DIR:$PATH"

        # Verify the install using the direct binary path (avoids any Docker
        # CLI plugin-discovery issue that can cause `docker scout version` to
        # return empty on GitHub runners).
        echo "Scout version: $("$PLUGIN_DIR/docker-scout" version 2>&1 | head -1 || echo 'could not determine')"
        echo "Scout --format support: $(docker-scout cves --help 2>&1 | grep -o '\-\-format' | head -1 || echo 'flag not found')"

    - name: Docker login for Docker Scout
      shell: bash
      env:
        DH_USER: ${{ inputs.dh-user }}
        DH_PASSWORD: ${{ inputs.dh-password }}
      run: |
        set -euo pipefail
        if [[ -n "$DH_USER" && -n "$DH_PASSWORD" ]]; then
          echo "$DH_PASSWORD" | docker login --username "$DH_USER" --password-stdin
        else
          echo "ERROR: Docker Scout requires Docker Hub authentication. Provide dh-user and dh-password."
          exit 1
        fi

    - name: Run patch and verification flow
      id: run-patcher
      shell: bash
      run: |
        set -euo pipefail

        owner="$(echo "${GITHUB_REPOSITORY_OWNER:-local}" | tr '[:upper:]' '[:lower:]')"
        repo="$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
        run_id="${GITHUB_RUN_ID:-local}"
        attempt="${GITHUB_RUN_ATTEMPT:-1}"
        derived_image="${owner}/${repo}:${run_id}-${attempt}"

        image_output_file="$(mktemp)"

        cmd=(docker-vuln-patcher
          --image "$derived_image"
          --dockerfile-path "${{ inputs.dockerfile-path }}"
          --context-path "${{ inputs.context-path }}"
          --severities "${{ inputs.severities }}"
          --report-dir "${{ inputs.report-dir }}"
          --patched-suffix="${{ inputs.patched-suffix }}"
          --image-output-file "$image_output_file"
          --debug
        )

        [[ "${{ inputs.non-interactive }}" == "true" ]] && cmd+=(--non-interactive)
        [[ "${{ inputs.use-buildx }}"      == "true" ]] && cmd+=(--use-buildx)
        [[ "${{ inputs.dry-run }}"         == "true" ]] && cmd+=(--dry-run)
        [[ "${{ inputs.push }}"            == "true" ]] && cmd+=(--push)

        while IFS= read -r build_arg; do
          [[ -n "$build_arg" ]] && cmd+=(--build-arg "$build_arg")
        done <<< "${{ inputs.build-args }}"

        "${cmd[@]}"

        patched_image=""
        if [[ -s "$image_output_file" ]]; then
          patched_image="$(cat "$image_output_file")"
        fi
        echo "patched_image=${patched_image}" >> "$GITHUB_OUTPUT"

    # ──────────────────────────────────────────────────────────────────────────
    # Optional: open a PR with the verified patch Dockerfile + CVE summary.
    # Only runs when create-pr=true, not in dry-run mode, and only when the
    # patcher actually produced a patched Dockerfile (i.e. CVEs were found).
    # ──────────────────────────────────────────────────────────────────────────
    - name: Create vulnerability patch PR
      id: create-pr
      if: ${{ inputs.create-pr == 'true' && inputs.dry-run != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        report_dir="${{ inputs.report-dir }}"
        dockerfile_path="${{ inputs.dockerfile-path }}"
        patched_image="${{ steps.run-patcher.outputs.patched_image }}"

        # ── Locate artifacts ─────────────────────────────────────────────────
        # Pick the Dockerfile from the highest-numbered iteration (most patched).
        patched_df=$(find "$report_dir" -name "Dockerfile.*.patched" -type f 2>/dev/null \
                       | sort -V | tail -1 || true)

        if [[ -z "$patched_df" ]]; then
          echo "INFO: No patched Dockerfile found — image was already clean. Skipping PR."
          echo "pr_url=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        patch_plan=$(find "$report_dir" -name "patch_plan_*.json" -type f 2>/dev/null \
                       | head -1 || true)

        # ── Configure git ─────────────────────────────────────────────────────
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        branch="${{ inputs.pr-branch-prefix }}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT:-1}"
        base_branch="${GITHUB_REF_NAME:-main}"

        git checkout -b "$branch"

        # ── Stage files ───────────────────────────────────────────────────────
        cp "$patched_df" ./Dockerfile.patched
        git add ./Dockerfile.patched

        if [[ -n "$patch_plan" ]]; then
          cp "$patch_plan" ./patch_plan.json
          git add ./patch_plan.json
        fi

        # ── Generate PR body via standalone Python script ─────────────────────
        pr_body_file="$(mktemp --suffix=.md)"

        PATCH_PLAN_PATH="$patch_plan" \
        PATCHED_IMAGE="$patched_image" \
        DOCKERFILE_PATH="$dockerfile_path" \
        python3 "$GITHUB_ACTION_PATH/scripts/gen_pr_body.py" > "$pr_body_file"

        # ── Commit and push ───────────────────────────────────────────────────
        git commit -m "fix: automated docker security patches (workflow run ${GITHUB_RUN_ID:-local})"
        git push origin "$branch"

        # ── Open the PR ───────────────────────────────────────────────────────
        df_basename="$(basename "$dockerfile_path")"
        pr_url=$(gh pr create \
          --title "Docker Security Patch: fix vulnerabilities in ${df_basename}" \
          --body-file "$pr_body_file" \
          --base  "$base_branch" \
          --head  "$branch")

        echo "pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
        echo "Pull request created: ${pr_url}"
